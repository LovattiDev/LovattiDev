name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake (Dark + Light)
        uses: Platane/snk@v3
        with:
          github_user_name: LovattiDev
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/LovattiDev/LovattiDev.git repo
          cd repo
          cp ../github-contribution-grid-snake*.svg .
          git add .
          git commit -m "update snake" || echo "no changes"
          git push
